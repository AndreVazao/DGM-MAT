name: Validation

on:
  push:
  pull_request:

jobs:

  validate:

    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright
        run: |
          playwright install

      - name: Lint
        run: |
          python -m compileall .

      - name: Validate startup
        run: |
          python -c "from core.runtime.runtime import Runtime; Runtime()"
