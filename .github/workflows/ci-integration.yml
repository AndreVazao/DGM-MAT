---
name: CI Integration

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integration:
    name: "Integration (${{ matrix.os }}, Py${{ matrix.python-version }})"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: "Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Full Integration Stack
        env:
          PYTHONPATH: .
        run: |
          pytest tests/integration/ -v
          pytest tests/bootstrap/ -v
          pytest tests/import_fabric/ -v
          pytest tests/execution_fabric/ -v
          pytest tests/provider_sync/ -v
          pytest tests/knowledge_graph/ -v
      - name: Verify Discovered Tests
        run: |
          echo "Integration Test Discovery Check"
          pytest --collect-only tests/integration/
