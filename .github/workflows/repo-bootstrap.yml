name: Repository Initial Bootstrap

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: 'Name of the repository to bootstrap'
        required: true
      category:
        description: 'Ecosystem category'
        required: true
        default: 'Labs'

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt
      - name: Run Bootstrap Logic
        run: |
          set PYTHONPATH=.
          python scripts/repo_bootstrap_interactive.py --repo ${{ github.event.inputs.repo_name }} --category ${{ github.event.inputs.category }}
