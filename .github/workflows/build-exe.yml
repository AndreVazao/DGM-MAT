name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements/build.txt
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install
      - name: Runtime Boot Validation
        run: |
          set PYTHONPATH=.
          python -c "from core.runtime.runtime import Runtime; r = Runtime(); r.bootstrap(); r.shutdown()"
      - name: Build EXE
        run: |
          pyinstaller ^
            --noconfirm ^
            --windowed ^
            --onefile ^
            --hidden-import=pydantic.deprecated.decorator ^
            main.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DGM-MAT-Windows
          path: dist/*
