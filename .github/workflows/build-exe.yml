name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements/build.txt
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install
      - name: Runtime Smoke Test
        run: |
          set PYTHONPATH=.
          python scripts/runtime_smoke_test.py
      - name: Build EXE
        run: |
          pyinstaller build/dgm_mat.spec --noconfirm
      - name: Validate EXE
        run: |
          python scripts/validate_executable.py dist/DGM-MAT/DGM-MAT.exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DGM-MAT-Windows
          path: dist/DGM-MAT/*
