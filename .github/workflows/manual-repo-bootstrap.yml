name: DGM-MAT Manual Repo Bootstrap (Interactive)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - create
          - update
          - deprecate
          - list
      repos:
        description: "Repo names (comma separated)"
        required: false
        type: string
      description:
        description: "Optional description for repos"
        required: false
        type: string
      visibility:
        description: "Repo visibility"
        required: false
        default: public
        type: choice
        options:
          - public
          - private

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  repo-manager:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Repo Manager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: AndreVazao
          ACTION: ${{ inputs.action }}
          REPOS: ${{ inputs.repos }}
          DESCRIPTION: ${{ inputs.description }}
          VISIBILITY: ${{ inputs.visibility }}
        run: python scripts/repo_bootstrap_interactive.py
