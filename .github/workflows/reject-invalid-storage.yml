name: Reject Invalid Storage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-storage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validate Storage Architecture
        run: python scripts/validate_storage.py
