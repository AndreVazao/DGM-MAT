---
name: Bootstrap Ecosystem

"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ecosystem.json"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Materialize Ecosystem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c "
          from core.bootstrap import BootstrapEngine
          BootstrapEngine(profile='HEADLESS').prepare()
          "
