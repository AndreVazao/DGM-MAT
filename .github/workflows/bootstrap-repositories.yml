name: Bootstrap DGM Repositories

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      - name: Bootstrap repositories via GitHub API
        shell: bash
        run: |

          repos=(
            DGM-MAT-Cluster
            DGM-MAT-Media
            DGM-MAT-Studio
            DGM-MAT-Marketplace
            DGM-MAT-Memory
            DGM-MAT-Runtime
            DGM-MAT-Orchestrator
            DGM-MAT-Agents
            DGM-MAT-OS
          )

          for repo in "${repos[@]}"
          do
            echo "Creating $repo"

            # CHECK IF EXISTS
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GH_TOKEN" \
              https://api.github.com/repos/AndreVazao/$repo)

            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "$repo already exists"
              continue
            fi

            # CREATE REPO
            curl -s -X POST https://api.github.com/user/repos \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d "{
                \"name\": \"$repo\",
                \"private\": false,
                \"auto_init\": true,
                \"description\": \"DGM-MAT ecosystem module\"
              }"

            echo "$repo created"
          done
