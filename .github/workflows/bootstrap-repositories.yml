name: Bootstrap DGM Repositories

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate GitHub CLI
        shell: bash
        run: |
          echo "$GH_TOKEN" > token.txt
          gh auth login --with-token < token.txt

      - name: Bootstrap repositories
        shell: bash
        run: |

          repos=(
            DGM-MAT-Cluster
            DGM-MAT-Media
            DGM-MAT-Studio
            DGM-MAT-Marketplace
            DGM-MAT-Memory
            DGM-MAT-Runtime
            DGM-MAT-Orchestrator
            DGM-MAT-Agents
            DGM-MAT-OS
          )

          mkdir temp-bootstrap
          cd temp-bootstrap

          for repo in "${repos[@]}"
          do

            echo "================================="
            echo "CREATING $repo"
            echo "================================="

            mkdir "$repo"
            cd "$repo"

            git init

            echo "# $repo" > README.md
            echo "" >> README.md
            echo "Part of the DGM-MAT ecosystem." >> README.md

            echo "MIT License" > LICENSE
            echo "Copyright (c) 2026 AndreVazao" >> LICENSE

            echo "node_modules/" > .gitignore
            echo "dist/" >> .gitignore
            echo ".env" >> .gitignore

            mkdir -p .github/workflows

            echo "name: Health Check" > .github/workflows/health-check.yml
            echo "" >> .github/workflows/health-check.yml
            echo "on:" >> .github/workflows/health-check.yml
            echo "  workflow_dispatch:" >> .github/workflows/health-check.yml
            echo "" >> .github/workflows/health-check.yml
            echo "jobs:" >> .github/workflows/health-check.yml
            echo "  health:" >> .github/workflows/health-check.yml
            echo "    runs-on: ubuntu-latest" >> .github/workflows/health-check.yml
            echo "    steps:" >> .github/workflows/health-check.yml
            echo "      - run: echo Repository healthy" >> .github/workflows/health-check.yml

            git config user.name "github-actions"
            git config user.email "actions@github.com"

            git add .
            git commit -m "Initial bootstrap"

            gh repo create AndreVazao/$repo --public --source . --remote origin --push

            cd ..

          done
