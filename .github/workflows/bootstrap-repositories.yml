name: Bootstrap DGM Repositories

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      - name: Validate token (critical debug)
        shell: bash
        run: |
          echo "Testing authentication..."
          curl -s -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/user

      - name: Bootstrap repositories
        shell: bash
        run: |

          set -e

          repos=(
            DGM-MAT-Cluster
            DGM-MAT-Media
            DGM-MAT-Studio
            DGM-MAT-Marketplace
            DGM-MAT-Memory
            DGM-MAT-Runtime
            DGM-MAT-Orchestrator
            DGM-MAT-Agents
            DGM-MAT-OS
          )

          echo "=================================="
          echo "DGM-MAT BOOTSTRAP START"
          echo "=================================="

          for repo in "${repos[@]}"
          do
            echo ""
            echo "----------------------------------"
            echo "Processing: $repo"
            echo "----------------------------------"

            # CHECK IF EXISTS
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              https://api.github.com/repos/AndreVazao/$repo)

            if [ "$STATUS" -eq 200 ]; then
              echo "✔ EXISTS: $repo"
              continue
            fi

            # CREATE REPO
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.github.com/user/repos \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d "{
                \"name\": \"$repo\",
                \"private\": false,
                \"auto_init\": true,
                \"description\": \"DGM-MAT ecosystem module\"
              }")

            BODY=$(echo "$RESPONSE" | sed '$d')
            CODE=$(echo "$RESPONSE" | tail -n 1)

            echo "HTTP CODE: $CODE"
            echo "RESPONSE:"
            echo "$BODY"

            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 300 ]; then
              echo "✔ CREATED: $repo"
            else
              echo "❌ FAILED: $repo"
              echo "STOPPED FOR DEBUG"
              exit 1
            fi

          done

          echo ""
          echo "=================================="
          echo "BOOTSTRAP COMPLETE"
          echo "=================================="
