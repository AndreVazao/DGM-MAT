- name: Bootstrap repositories
  shell: bash
  env:
    GH_TOKEN: ${{ secrets.GH_PAT }}
    GITHUB_TOKEN: ${{ secrets.GH_PAT }}
  run: |

    repos=(
      DGM-MAT-Cluster
      DGM-MAT-Media
      DGM-MAT-Studio
      DGM-MAT-Marketplace
      DGM-MAT-Memory
      DGM-MAT-Runtime
      DGM-MAT-Orchestrator
      DGM-MAT-Agents
      DGM-MAT-OS
    )

    mkdir temp-bootstrap
    cd temp-bootstrap

    for repo in "${repos[@]}"
    do

      echo "CREATING $repo"

      mkdir -p "$repo"
      cd "$repo"

      git init

      echo "# $repo" > README.md
      echo "DGM-MAT module" >> README.md

      echo "MIT License" > LICENSE
      echo "Copyright (c) 2026 AndreVazao" >> LICENSE

      echo "node_modules/" > .gitignore
      echo ".env" >> .gitignore

      mkdir -p .github/workflows

      cat > .github/workflows/health.yml << 'EOF'
name: Health Check

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo OK
EOF

      git config user.name "github-actions"
      git config user.email "actions@github.com"

      git add .
      git commit -m "bootstrap"

      # FORÇAR USO DO TOKEN CORRETO
      gh repo create "AndreVazao/$repo" \
        --public \
        --source . \
        --remote origin \
        --push \
        --confirm

      cd ..

    done
