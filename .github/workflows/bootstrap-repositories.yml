---
name: Bootstrap Ecosystem

"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ecosystem.json"

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Materialize Ecosystem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c "
          from core.bootstrap.bootstrap_engine import BootstrapEngine
          BootstrapEngine(profile='HEADLESS').prepare()
          "
