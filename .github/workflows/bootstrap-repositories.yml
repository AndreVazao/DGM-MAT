name: Bootstrap DGM Repositories

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      - name: Bootstrap repositories via GitHub API
        shell: bash
        run: |

          repos=(
            DGM-MAT-Cluster
            DGM-MAT-Media
            DGM-MAT-Studio
            DGM-MAT-Marketplace
            DGM-MAT-Memory
            DGM-MAT-Runtime
            DGM-MAT-Orchestrator
            DGM-MAT-Agents
            DGM-MAT-OS
          )

          echo "Starting bootstrap..."

          for repo in "${repos[@]}"
          do
            echo "-----------------------------------"
            echo "Processing: $repo"
            echo "-----------------------------------"

            # CHECK IF REPO EXISTS
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/AndreVazao/$repo)

            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✔ $repo already exists"
              continue
            fi

            # CREATE REPO
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.github.com/user/repos \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d "{
                \"name\": \"$repo\",
                \"private\": false,
                \"auto_init\": true,
                \"description\": \"DGM-MAT ecosystem module\"
              }")

            BODY=$(echo "$RESPONSE" | head -n 1)
            CODE=$(echo "$RESPONSE" | tail -n 1)

            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 300 ]; then
              echo "✔ $repo created successfully"
            else
              echo "⚠ Failed to create $repo"
              echo "$BODY"
            fi

          done

          echo "Bootstrap completed."
