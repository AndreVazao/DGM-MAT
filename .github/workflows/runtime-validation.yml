---
name: Runtime Validation

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Startup Bootstrap Validation
        env:
          PYTHONPATH: .
        run: python scripts/runtime_smoke_test.py
      - name: Autonomous Runtime Validation
        env:
          PYTHONPATH: .
        run: pytest tests/runtime/
