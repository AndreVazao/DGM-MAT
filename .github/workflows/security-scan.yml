---
name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security tools
        run: pip install bandit pip-audit safety
      - name: Run Bandit
        run: bandit -r core/ shared/ cockpit/ -ll
      - name: Run pip-audit
        run: pip-audit --desc on
      - name: Run Safety
        run: safety check
