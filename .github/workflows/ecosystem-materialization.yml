name: Ecosystem Materialization

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      fix_drift:
        description: 'Actually materialize missing structures'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  validate-and-materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pydantic loguru

      - name: Validate Ecosystem Structure
        run: |
          PYTHONPATH=. python3 core/ecosystem/ecosystem_validator.py

      - name: Materialize Ecosystem (Dry Run)
        run: |
          PYTHONPATH=. python3 core/ecosystem/ecosystem_materializer.py

      - name: Materialize Ecosystem (Fix)
        if: github.event.inputs.fix_drift == 'true'
        run: |
          PYTHONPATH=. python3 core/ecosystem/ecosystem_materializer.py --fix
