name: Runtime Health

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:

  health:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Runtime Validation
        run: |
          python -c "from core.runtime.runtime import Runtime; Runtime().bootstrap()"
