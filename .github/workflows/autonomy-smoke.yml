---
name: Autonomy Validation

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  autonomy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Autonomy Suite
        env:
          PYTHONPATH: .
        run: pytest tests/autonomy/ -v
      - name: Run Self Evolution Tests
        env:
          PYTHONPATH: .
        run: pytest tests/self_evolution/ -v
      - name: Autonomy Assertions
        run: |
          python -c "import os; \
            assert os.path.exists('tests/autonomy/test_loop.py'), \
            'Critical autonomy tests missing'"
