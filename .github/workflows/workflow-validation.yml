---
name: Workflow Validation

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: yamllint .github/workflows/

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify no actions/checkout@v4
        run: |
          ! grep -r --exclude=workflow-validation.yml \
            "actions/checkout@v4" .github/workflows/
      - name: Verify no actions/setup-python@v5
        run: |
          ! grep -r --exclude=workflow-validation.yml \
            "actions/setup-python@v5" .github/workflows/
      - name: Verify no Node 20 references
        run: |
          ! grep -ri --exclude=workflow-validation.yml \
            "Node 20" .github/workflows/
      - name: Verify no deprecated runners
        run: |
          ! grep -rE --exclude=workflow-validation.yml \
            "ubuntu-20.04|macos-11|macos-12|windows-2019" .github/workflows/
      - name: Verify Node 24 enforcement
        run: |
          for f in .github/workflows/*.yml; do
            grep -q "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24" "$f" || \
              (echo "Error: $f is missing Node 24 enforcement" && false)
          done
      - name: Verify no continue-on-error abuse
        run: |
          ! grep -ri --exclude=workflow-validation.yml \
            "continue-on-error: true" .github/workflows/

  repository-detox-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fail if PyInstaller artifacts are tracked
        run: |
          PROHIBITED_FILES=$(git ls-files | grep -E "\.toc$|\.pkg$|\.pyz$|xref-.*\.html$|warn-.*\.txt$|build/build/|dist/|build-temp/|build/dgm_mat/")
          if [ -n "$PROHIBITED_FILES" ]; then
            echo "CRITICAL ERROR: Prohibited artifacts found in git tracking:"
            echo "$PROHIBITED_FILES"
            false
          fi
      - name: Fail if oversized binaries are tracked (>1MB)
        run: |
          OVERSIZED=$(find . -size +1M -not -path '*/.*' -not -path './.git/*')
          if [ -n "$OVERSIZED" ]; then
            echo "CRITICAL ERROR: Oversized files (>1MB) found in repository:"
            echo "$OVERSIZED"
            false
          fi
      - name: Fail if cache folders are tracked
        run: |
          CACHE_FOLDERS=$(git ls-files | grep -E "__pycache__/|\.pytest_cache/")
          if [ -n "$CACHE_FOLDERS" ]; then
            echo "CRITICAL ERROR: Cache folders found in git tracking:"
            echo "$CACHE_FOLDERS"
            false
          fi
