---
name: CI Core

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: "Core (${{ matrix.os }}, Py${{ matrix.python-version }})"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: "Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov
      - name: Lint (Compile Check)
        run: python -m compileall core/ cockpit/ shared/
      - name: Run Unit Tests with Coverage
        env:
          PYTHONPATH: .
        run: |
          pytest tests/unit/ -v --tb=short --cov=core --cov-report=term-missing
      - name: Run Specialized Core Suites
        env:
          PYTHONPATH: .
        run: |
          pytest tests/repository_cognition/ -v
          pytest tests/execution_fabric/ -v
          pytest tests/provider_mesh/ -v
      - name: Verify Test Execution
        shell: bash
        run: |
          echo "Finalizing Core Validation..."
          ls .coverage || (echo "Error: Coverage report missing" && false)
