name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Validate Storage Architecture
        run: python scripts/validate_storage.py
      - name: Validate Dependency Governance
        run: python scripts/validate_dependencies.py
      - name: Lint (Compile Check)
        run: python -m compileall .
      - name: Runtime Boot Validation
        run: |
          PYTHONPATH=. python -c "from core.runtime.runtime import Runtime; r = Runtime(); r.bootstrap(); r.shutdown()"
      - name: Run Dependency Integrity Tests
        run: |
          PYTHONPATH=. pytest tests/test_dependency_integrity.py
      - name: Run All Tests
        run: |
          PYTHONPATH=. pytest tests/
